<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jenney's Latin — Vocabula Flashcards</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: linear-gradient(135deg,#0d0d1a 0%,#1a1a2e 50%,#0d1a0d 100%);
    background-attachment: fixed;
    color:#e8dfc8;
    display:flex; flex-direction:column; align-items:center;
    padding:20px 16px 48px; min-height:100vh;
  }
  .sub { font-size:11px; letter-spacing:6px; color:#888; text-transform:uppercase; text-align:center; margin-bottom:4px; }
  h1 { font-weight:normal; font-size:26px; letter-spacing:1px; text-align:center; color:#e8dfc8; }
  .count { font-size:12px; color:#666; text-align:center; margin-top:4px; }
  .row { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:16px; max-width:620px; }
  .toggle, .filter, .ctrl, .small {
    font-family:inherit; cursor:pointer; transition:all .15s;
    border-radius:20px; border:1px solid #444; background:transparent; color:#888;
  }
  .toggle { padding:6px 18px; font-size:12px; letter-spacing:2px; text-transform:uppercase; }
  .toggle.active { background:#e8dfc8; color:#1a1a2e; border-color:#e8dfc8; }
  .filter { padding:4px 12px; border-radius:14px; font-size:11px; letter-spacing:1px; text-transform:uppercase; border-color:#333; color:#666; }
  .filter.active { font-weight:bold; }
  .progress { width:100%; max-width:480px; height:3px; background:#222; border-radius:2px; margin:20px 0; }
  .progress > div { height:100%; border-radius:2px; transition:width .3s; }
  .scene { width:100%; max-width:480px; perspective:1000px; }
  .card {
    position:relative; width:100%; height:300px; cursor:pointer;
    transform-style:preserve-3d; transition:transform .5s cubic-bezier(.4,0,.2,1);
  }
  .card.flipped { transform:rotateY(180deg); }
  .face {
    position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
    border-radius:20px; padding:32px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
  }
  .back { transform:rotateY(180deg); }
  .tag { position:absolute; top:16px; left:20px; font-size:10px; letter-spacing:3px; text-transform:uppercase; opacity:.85; }
  .idx { position:absolute; top:16px; right:20px; font-size:10px; color:#555; }
  .term { line-height:1.5; color:#f0e8d0; }
  .hint { position:absolute; bottom:16px; font-size:11px; color:#444; letter-spacing:1px; }
  .answer { line-height:1.5; margin-bottom:16px; }
  .details { display:flex; gap:18px; flex-wrap:wrap; justify-content:center; }
  .detail .lbl { font-size:9px; color:#555; letter-spacing:2px; text-transform:uppercase; margin-bottom:3px; }
  .detail .val { font-size:14px; color:#aaa; }
  .controls { display:flex; gap:12px; margin-top:24px; align-items:center; }
  .nav { width:44px; height:44px; border-radius:50%; border:1px solid #333; background:transparent; color:#888; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-family:inherit; }
  .nav:disabled { color:#333; cursor:default; }
  .known-btn { padding:10px 24px; border-radius:22px; background:transparent; font-size:12px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; font-family:inherit; transition:all .2s; }
  .small { padding:6px 18px; border-radius:16px; border-color:#333; color:#666; font-size:11px; letter-spacing:2px; margin-top:14px; }
  .mastery { margin-top:20px; text-align:center; }
  .mastery .lbl { font-size:11px; color:#555; margin-bottom:6px; letter-spacing:2px; text-transform:uppercase; }
  .mbar { width:200px; height:4px; background:#222; border-radius:2px; margin:0 auto; }
  .mbar > div { height:100%; background:#4ecb71; border-radius:2px; transition:width .4s; }
  .italic { font-style:italic; }
</style>
</head>
<body>
  <div class="sub">Jenney's First Year Latin</div>
  <h1>Vocabula</h1>
  <div class="count" id="count"></div>

  <div class="row" id="modeRow">
    <button class="toggle active" data-mode="latin">Latin &#8594; EN</button>
    <button class="toggle" data-mode="english">EN &#8594; Latin</button>
  </div>

  <div class="row" id="filterRow"></div>

  <div class="progress"><div id="progBar"></div></div>

  <div class="scene">
    <div class="card" id="card">
      <div class="face front" id="front"></div>
      <div class="face back" id="back"></div>
    </div>
  </div>

  <div class="controls">
    <button class="nav" id="prev">&#8592;</button>
    <button class="known-btn" id="knownBtn"></button>
    <button class="nav" id="next">&#8594;</button>
  </div>

  <div class="row">
    <button class="small" id="shuffle">&#8646; Shuffle</button>
    <button class="small" id="reset">&#8635; Reset</button>
  </div>

  <div class="mastery" id="mastery" style="display:none;">
    <div class="lbl" id="masteryLbl"></div>
    <div class="mbar"><div id="masteryBar"></div></div>
  </div>

er": "—", "pos": "verb 1", "en": "deny, say...not"}, {"latin": "nesciō, nescīre, nescīvī, nescītum", "genitive": "—", "gender": "—", "pos": "verb 4", "en": "not know"}, {"latin": "obtineō, obtinēre, obtinuī, obtentum", "genitive": "—", "gender": "—", "pos": "verb 2", "en": "hold (against opposition)"}, {"latin": "pertineō, pertinēre, pertinuī, —", "genitive": "—", "gender": "—", "pos": "verb 2", "en": "pertain; extend"}, {"latin": "putō, -āre, -āvī, -ātum", "genitive": "—", "gender": "—", "pos": "verb 1", "en": "think"}, {"latin": "sciō, scīre, scīvī, scītum", "genitive": "—", "gender": "—", "pos": "verb 4", "en": "know"}, {"latin": "sentiō, sentīre, sēnsī, sēnsum", "genitive": "—", "gender": "—", "pos": "verb 4", "en": "feel, realize"}, {"latin": "spērō, -āre, -āvī, -ātum", "genitive": "—", "gender": "—", "pos": "verb 1", "en": "hope"}, {"latin": "ergō", "genitive": "—", "gender": "—", "pos": "adverb", "en": "therefore"}, {"latin": "praetereā", "genitive": "—", "gender": "—", "pos": "adverb", "en": "besides, besides that"}, {"latin": "procul", "genitive": "—", "gender": "—", "pos": "adverb", "en": "at some distance"}, {"latin": "subitō", "genitive": "—", "gender": "—", "pos": "adverb", "en": "suddenly"}, {"latin": "umquam", "genitive": "—", "gender": "—", "pos": "adverb", "en": "ever"}, {"latin": "nē", "genitive": "—", "gender": "—", "pos": "adverb", "en": "not"}, {"latin": "vērō", "genitive": "—", "gender": "—", "pos": "adverb", "en": "in truth, indeed; but"}, {"latin": "cum", "genitive": "—", "gender": "—", "pos": "conjunction", "en": "when, since, although"}, {"latin": "num", "genitive": "—", "gender": "—", "pos": "conjunction", "en": "if, whether"}, {"latin": "an", "genitive": "—", "gender": "—", "pos": "conjunction", "en": "or"}, {"latin": "annōn", "genitive": "—", "gender": "—", "pos": "conjunction", "en": "or not"}, {"latin": "autem", "genitive": "—", "gender": "—", "pos": "conjunction", "en": "but, however; and, moreover (postpositive)"}, {"latin": "enim", "genitive": "—", "gender": "—", "pos": "conjunction", "en": "for (postpositive)"}, {"latin": "vel", "genitive": "—", "gender": "—", "pos": "conjunction", "en": "or"}, {"latin": "utrum...an...", "genitive": "—", "gender": "—", "pos": "conjunction", "en": "whether...or..."}, {"latin": "utrum...necne", "genitive": "—", "gender": "—", "pos": "conjunction", "en": "whether...or not"}, {"latin": "apud", "genitive": "—", "gender": "prep. + acc.", "pos": "preposition", "en": "among, at the house of, in the presence of"}, {"latin": "circum", "genitive": "—", "gender": "prep. + acc.", "pos": "preposition", "en": "around"}, {"latin": "praeter", "genitive": "—", "gender": "prep. + acc.", "pos": "preposition", "en": "beyond, besides, except"}, {"latin": "prō", "genitive": "—", "gender": "prep. + abl.", "pos": "preposition", "en": "in front of, on behalf of, in exchange for, instead of"}, {"latin": "suī, sibi, sē", "genitive": "—", "gender": "refl.", "pos": "pronoun", "en": "himself, herself, itself, themselves"}];

const POS = {
  noun:        {label:"NOUN",        bg:"#1a3a5c", accent:"#4a9eff"},
  adjective:   {label:"ADJ",         bg:"#1a4a2e", accent:"#4ecb71"},
  "verb 1":    {label:"VERB I",      bg:"#4a2010", accent:"#ff7040"},
  "verb 2":    {label:"VERB II",     bg:"#4a2010", accent:"#ff9060"},
  "verb 3":    {label:"VERB III",    bg:"#4a2010", accent:"#ffaa70"},
  "verb 4":    {label:"VERB IV",     bg:"#4a2010", accent:"#ffcc90"},
  numeral:     {label:"NUM",         bg:"#3a1a5c", accent:"#bb88ff"},
  adverb:      {label:"ADV",         bg:"#3a3010", accent:"#e8c040"},
  conjunction: {label:"CONJ",        bg:"#1a3a4a", accent:"#40d0d0"},
  preposition: {label:"PREP",        bg:"#3a1a3a", accent:"#e060c0"},
  pronoun:     {label:"PRON",        bg:"#1a4040", accent:"#40e0b0"},
};
const FILTERS = ["all","noun","adjective","pronoun","verb 1","verb 2","verb 3","verb 4","numeral","adverb","conjunction","preposition"];

let mode = "latin";
let filterPos = "all";
let deck = shuffle(VOCAB.slice());
let index = 0;
let flipped = false;
const known = new Set();

function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function filtered(){ return filterPos==="all"?deck:deck.filter(c=>c.pos===filterPos); }
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function sz(t){ return t.length>40?15:t.length>25?20:28; }

function buildFilters(){
  const row=document.getElementById("filterRow");
  row.innerHTML="";
  FILTERS.forEach(p=>{
    const b=document.createElement("button");
    b.className="filter"+(filterPos===p?" active":"");
    b.textContent = p==="all"?"ALL":(POS[p]?POS[p].label:p);
    if(filterPos===p && p!=="all"){ b.style.color=POS[p].accent; b.style.borderColor=POS[p].accent; b.style.background=POS[p].bg; }
    if(filterPos===p && p==="all"){ b.style.color="#e8dfc8"; b.style.borderColor="#e8dfc8"; }
    b.onclick=()=>{ filterPos=p; index=0; flipped=false; deck=shuffle(VOCAB.slice()); render(); };
    row.appendChild(b);
  });
}

function render(){
  const list=filtered();
  document.getElementById("count").textContent = VOCAB.length+" words \u00b7 "+known.size+" known";
  buildFilters();

  const card=document.getElementById("card");
  const front=document.getElementById("front");
  const back=document.getElementById("back");

  if(list.length===0){
    front.innerHTML='<div class="term" style="font-size:16px;color:#666">No cards in this category.</div>';
    back.innerHTML=""; 
    document.getElementById("progBar").style.width="0%";
    return;
  }
  if(index>=list.length) index=list.length-1;
  const c=list[index];
  const cfg=POS[c.pos]||POS.noun;

  card.className="card"+(flipped?" flipped":"");

  const term = mode==="latin"?c.latin:c.en;
  const ans = mode==="latin"?c.en:c.latin;

  front.style.background="linear-gradient(145deg,"+cfg.bg+" 0%,#0d0d1a 100%)";
  front.style.border="1px solid "+cfg.accent+"33";
  front.style.boxShadow="0 0 40px "+cfg.accent+"22, 0 20px 60px #00000088";
  front.innerHTML =
    '<div class="tag" style="color:'+cfg.accent+'">'+cfg.label+'</div>'+
    '<div class="idx">'+(index+1)+' / '+list.length+'</div>'+
    '<div class="term '+(mode==="latin"?"italic":"")+'" style="font-size:'+sz(term)+'px">'+esc(term)+'</div>'+
    '<div class="hint">tap to reveal</div>';

  let details="";
  if(c.pos==="noun"){
    details='<div class="details">';
    if(c.genitive!=="\u2014") details+='<div class="detail"><div class="lbl">Genitive</div><div class="val italic">'+esc(c.genitive)+'</div></div>';
    details+='<div class="detail"><div class="lbl">Gender</div><div class="val">'+esc(c.gender)+'</div></div></div>';
  } else if((c.pos==="adjective"||c.pos==="pronoun")&&c.gender!=="\u2014"){
    details='<div class="detail"><div class="lbl">Type</div><div class="val">'+esc(c.gender)+'</div></div>';
  } else if(c.pos==="preposition"){
    details='<div class="detail"><div class="lbl">Case</div><div class="val">'+esc(c.gender)+'</div></div>';
  }

  back.style.background="linear-gradient(145deg,#1a1a1a 0%,"+cfg.bg+"aa 100%)";
  back.style.border="1px solid "+cfg.accent+"66";
  back.style.boxShadow="0 0 60px "+cfg.accent+"33, 0 20px 60px #00000088";
  back.innerHTML =
    '<div class="tag" style="color:'+cfg.accent+'">'+cfg.label+'</div>'+
    '<div class="answer '+(mode==="english"?"italic":"")+'" style="font-size:'+sz(ans)+'px;color:'+cfg.accent+'">'+esc(ans)+'</div>'+
    details;

  document.getElementById("progBar").style.width=((index+1)/list.length*100)+"%";
  document.getElementById("progBar").style.background=cfg.accent;

  const kb=document.getElementById("knownBtn");
  const isK=known.has(c.latin);
  kb.textContent=isK?"\u2713 Known":"Mark Known";
  kb.style.border="1px solid "+cfg.accent;
  kb.style.color=isK?cfg.bg:cfg.accent;
  kb.style.background=isK?cfg.accent:"transparent";

  document.getElementById("prev").disabled=index===0;
  document.getElementById("next").disabled=index===list.length-1;

  const m=document.getElementById("mastery");
  if(known.size>0){
    m.style.display="block";
    document.getElementById("masteryLbl").textContent=known.size+" / "+VOCAB.length+" mastered";
    document.getElementById("masteryBar").style.width=(known.size/VOCAB.length*100)+"%";
  } else m.style.display="none";
}

document.getElementById("card").onclick=()=>{ flipped=!flipped; render(); };
document.getElementById("prev").onclick=()=>{ if(index>0){index--;flipped=false;render();} };
document.getElementById("next").onclick=()=>{ const l=filtered(); if(index<l.length-1){index++;flipped=false;render();} };
document.getElementById("knownBtn").onclick=()=>{ const c=filtered()[index]; if(!c)return; known.has(c.latin)?known.delete(c.latin):known.add(c.latin); render(); };
document.getElementById("shuffle").onclick=()=>{ deck=shuffle(VOCAB.slice()); index=0; flipped=false; render(); };
document.getElementById("reset").onclick=()=>{ deck=shuffle(VOCAB.slice()); index=0; flipped=false; known.clear(); render(); };
document.getElementById("modeRow").onclick=(e)=>{ const b=e.target.closest("[data-mode]"); if(!b)return; mode=b.dataset.mode; flipped=false; document.querySelectorAll("#modeRow .toggle").forEach(t=>t.classList.toggle("active",t===b)); render(); };

document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowLeft") document.getElementById("prev").click();
  else if(e.key==="ArrowRight") document.getElementById("next").click();
  else if(e.key===" "||e.key==="Enter"){ e.preventDefault(); flipped=!flipped; render(); }
});

render();
</script>
