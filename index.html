<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jenney's Latin — Vocabula Flashcards</title>
<style>

  .count { font-size:12px; color:#666; text-align:center; margin-top:4px; }

  .toggle, .small { font-family:inherit; cursor:pointer; transition:all .15s; border-radius:20px; border:1px solid #444; background:transparent; color:#888; }
  .toggle { padding:6px 18px; font-size:12px; letter-spacing:2px; text-transform:uppercase; }
  .toggle.active { background:#e8dfc8; color:#1a1a2e; border-color:#e8dfc8; }
  .study { padding:7px 16px; border-radius:20px; font-size:12px; letter-spacing:1px; text-transform:uppercase; border:1px solid #555; color:#999; background:transparent; cursor:pointer; font-family:inherit; transition:all .15s; display:flex; align-items:center; gap:7px; }
  .study .badge { font-size:11px; padding:1px 8px; border-radius:10px; background:#2a2a3a; color:#bbb; }
  .study.active { border-width:1px; }
  .filter { padding:4px 12px; border-radius:14px; font-size:11px; letter-spacing:1px; text-transform:uppercase; border:1px solid #333; color:#666; background:transparent; cursor:pointer; font-family:inherit; transition:all .15s; }
  .progress { width:100%; max-width:480px; height:3px; background:#222; border-radius:2px; margin:18px 0 4px; }
  .progress > div { height:100%; border-radius:2px; transition:width .3s; }
  .scene { width:100%; max-width:480px; perspective:1000px; margin-top:14px; }
  .card { position:relative; width:100%; height:300px; cursor:pointer; transform-style:preserve-3d; transition:transform .5s cubic-bezier(.4,0,.2,1); }
  .card.flipped { transform:rotateY(180deg); }
  .face { position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; border-radius:20px; padding:32px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
  .back { transform:rotateY(180deg); }
  .tag { position:absolute; top:16px; left:20px; font-size:10px; letter-spacing:3px; text-transform:uppercase; opacity:.85; }
  .idx { position:absolute; top:16px; right:20px; font-size:10px; color:#555; }
  .star { position:absolute; bottom:14px; right:18px; font-size:18px; opacity:.5; }
  .term { line-height:1.4; color:#f0e8d0; }
  .hint { position:absolute; bottom:16px; font-size:11px; color:#444; letter-spacing:1px; }
  .answer { line-height:1.4; margin-bottom:16px; }
  .details { display:flex; gap:18px; flex-wrap:wrap; justify-content:center; }
  .detail .lbl { font-size:9px; color:#555; letter-spacing:2px; text-transform:uppercase; margin-bottom:3px; }
  .detail .val { font-size:14px; color:#aaa; }
  .controls { display:flex; gap:12px; margin-top:24px; align-items:center; justify-content:center; }
  .judge { display:flex; gap:14px; margin-top:20px; }
  .jbtn { padding:12px 26px; border-radius:24px; font-size:13px; letter-spacing:1px; cursor:pointer; font-family:inherit; transition:all .2s; border:1px solid; background:transparent; }
  .jbtn.still { border-color:#e8a040; color:#e8a040; }
  .jbtn.still:active { background:#e8a040; color:#1a1a2e; }
  .jbtn.know { border-color:#4ecb71; color:#4ecb71; }
  .jbtn.know:active { background:#4ecb71; color:#1a1a2e; }
  .nav { width:44px; height:44px; border-radius:50%; border:1px solid #333; background:transparent; color:#888; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-family:inherit; }
  .nav:disabled { color:#333; cursor:default; }
  .small { padding:6px 18px; border-radius:16px; border-color:#333; color:#666; font-size:11px; letter-spacing:2px; margin-top:16px; }
  .done { text-align:center; padding:40px 20px; }
  .done h2 { font-weight:normal; font-size:22px; color:#4ecb71; margin-bottom:10px; }
  .done p { color:#999; font-size:14px; line-height:1.6; }
  .italic { font-style:italic; }
</style>
</head>

  <div class="row">

const FILTERS = [
  ["all","ALL"],["noun","NOUNS"],["adjective","ADJ"],["pronoun","PRON"],
  ["numeral","NUM"],["__verb","VERBS"],["adverb","ADV"],
  ["conjunction","CONJ"],["preposition","PREP"]

let mode="latin", filterPos="all", study="all", index=0, flipped=false;
// status: each card key -> "known" | "still" | undefined (unseen)
const STORAGE_KEY = "jenney_latin_progress_v1";
let status = {};
try {
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved) status = JSON.parse(saved) || {};
} catch(e) { status = {}; }

function saveProgress(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(status)); } catch(e) {}
}

let deck = VOCAB.slice();
shuffle(deck);

function keyOf(c){ return c.latin+"|"+c.en; }
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function inFilter(c){
  if(filterPos==="all") return true;
  if(filterPos==="__verb") return c.pos.indexOf("verb")===0;
  return c.pos===filterPos;
}
function inStudy(c){
  const s=status[keyOf(c)];
  if(study==="all") return true;
  if(study==="known") return s==="known";
  if(study==="still") return s==="still"||s===undefined; // not yet known = still learning
  return true;
}
function filtered(){ return deck.filter(c=>inFilter(c)&&inStudy(c)); }
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function sz(t){return t.length>46?14:t.length>34?16:t.length>22?20:26;}

function counts(){
  let known=0, still=0;
  VOCAB.forEach(c=>{ const s=status[keyOf(c)]; if(s==="known")known++; else still++; });
  return {known, still, total:VOCAB.length};
}

function buildStudy(){
  const c=counts();
  const row=document.getElementById("studyRow"); row.innerHTML="";
  const opts=[
    ["all","All",c.total,"#e8dfc8"],
    ["still","Still learning",c.still,"#e8a040"],
    ["known","Known",c.known,"#4ecb71"]
  ];
  opts.forEach(([val,label,n,col])=>{
    const b=document.createElement("button");
    b.className="study"+(study===val?" active":"");
    b.innerHTML=esc(label)+' <span class="badge">'+n+'</span>';
    if(study===val){ b.style.borderColor=col; b.style.color=col; }
    b.onclick=()=>{ study=val; index=0; flipped=false; render(); };
    row.appendChild(b);
  });
}

function buildFilters(){
  const row=document.getElementById("filterRow"); row.innerHTML="";
  FILTERS.forEach(([pos,label])=>{
    const b=document.createElement("button");
    b.className="filter";
    b.textContent=label;
    const active=filterPos===pos;
    let accent="#e8dfc8";
    if(pos==="__verb") accent="#ff9060";
    else if(POS[pos]) accent=POS[pos].accent;
    if(active){ b.style.color=accent; b.style.borderColor=accent; b.style.background=(POS[pos]?POS[pos].bg:"#2a2a1a"); }
    b.onclick=()=>{ filterPos=pos; index=0; flipped=false; render(); };
    row.appendChild(b);
  });
}

function render(){
  const c=counts();
  document.getElementById("count").textContent = c.total+" words \u00b7 "+c.known+" known \u00b7 "+c.still+" still learning";
  buildStudy();
  buildFilters();
  const list=filtered();
  const card=document.getElementById("card"), front=document.getElementById("front"), back=document.getElementById("back");
  const judge=document.getElementById("judgeRow");

  if(list.length===0){
    let msg;
    if(study==="known") msg='<div class="done"><h2>Nothing here yet</h2><p>Mark cards \u201cI know it\u201d and they\u2019ll collect here.</p></div>';
    else if(study==="still") msg='<div class="done"><h2>\u2713 All clear!</h2><p>No cards left to learn in this set.<br>Switch to <b>All</b> or <b>Known</b> to review.</p></div>';
    else msg='<div class="done"><h2>No cards</h2><p>Try a different filter.</p></div>';
    front.innerHTML=msg; back.innerHTML="";
    front.style.background="linear-gradient(145deg,#1a1a2e,#0d0d1a)"; front.style.border="1px solid #333"; front.style.boxShadow="none";
    document.getElementById("progBar").style.width="0%";
    judge.style.display="none";
    document.getElementById("prev").disabled=true; document.getElementById("next").disabled=true;
    return;
  }
  judge.style.display="flex";
  if(index>=list.length) index=list.length-1;
  const cd=list[index], cfg=POS[cd.pos]||POS.noun, st=status[keyOf(cd)];
  card.className="card"+(flipped?" flipped":"");
  const term = mode==="latin"?cd.latin:cd.en;
  const ans = mode==="latin"?cd.en:cd.latin;
  const starMark = st==="known"?'<div class="star" style="color:#4ecb71">&#10003;</div>':(st==="still"?'<div class="star" style="color:#e8a040">&#8635;</div>':'');

  front.style.background="linear-gradient(145deg,"+cfg.bg+" 0%,#0d0d1a 100%)";
  front.style.border="1px solid "+cfg.accent+"33";
  front.style.boxShadow="0 0 40px "+cfg.accent+"22,0 20px 60px #00000088";
  front.innerHTML='<div class="tag" style="color:'+cfg.accent+'">'+cfg.label+'</div>'+
    '<div class="idx">'+(index+1)+' / '+list.length+'</div>'+
    '<div class="term '+(mode==="latin"?"italic":"")+'" style="font-size:'+sz(term)+'px">'+esc(term)+'</div>'+
    starMark+'<div class="hint">tap to reveal</div>';

  let details="";
  if(cd.pos==="noun"){
    details='<div class="details">';
    if(cd.genitive!=="\u2014") details+='<div class="detail"><div class="lbl">Genitive</div><div class="val italic">'+esc(cd.genitive)+'</div></div>';
    details+='<div class="detail"><div class="lbl">Gender</div><div class="val">'+esc(cd.gender)+'</div></div></div>';
  } else if((cd.pos==="adjective"||cd.pos==="pronoun"||cd.pos==="numeral")&&cd.gender!=="\u2014"){
    details='<div class="detail"><div class="lbl">Type</div><div class="val">'+esc(cd.gender)+'</div></div>';
  } else if(cd.pos==="preposition"&&cd.gender!=="\u2014"){
    details='<div class="detail"><div class="lbl">Case</div><div class="val">'+esc(cd.gender)+'</div></div>';
  }

  back.style.background="linear-gradient(145deg,#1a1a1a 0%,"+cfg.bg+"aa 100%)";
  back.style.border="1px solid "+cfg.accent+"66";
  back.style.boxShadow="0 0 60px "+cfg.accent+"33,0 20px 60px #00000088";
  back.innerHTML='<div class="tag" style="color:'+cfg.accent+'">'+cfg.label+'</div>'+
    '<div class="answer '+(mode==="english"?"italic":"")+'" style="font-size:'+sz(ans)+'px;color:'+cfg.accent+'">'+esc(ans)+'</div>'+details+starMark;

  document.getElementById("progBar").style.width=((index+1)/list.length*100)+"%";
  document.getElementById("progBar").style.background=cfg.accent;
  document.getElementById("prev").disabled=index===0;
  document.getElementById("next").disabled=index===list.length-1;
}

function judgeCard(verdict){
  const list=filtered();
  const cd=list[index];
  if(!cd) return;
  status[keyOf(cd)]=verdict;
  saveProgress();
  flipped=false;
  // In "still" mode, marking known removes the card from the current list,
  // so the same index now points to the next card. Otherwise advance.
  if(study==="still" && verdict==="known"){
    // list shrinks; keep index (clamped in render)
  } else if(index < list.length-1){
    index++;
  }
  render();
}

document.getElementById("card").onclick=()=>{flipped=!flipped;render();};
document.getElementById("prev").onclick=()=>{if(index>0){index--;flipped=false;render();}};
document.getElementById("next").onclick=()=>{if(index<filtered().length-1){index++;flipped=false;render();}};
document.getElementById("knowBtn").onclick=()=>judgeCard("known");
document.getElementById("stillBtn").onclick=()=>judgeCard("still");
document.getElementById("shuffle").onclick=()=>{shuffle(deck);index=0;flipped=false;render();};
document.getElementById("reset").onclick=()=>{for(const k in status)delete status[k];saveProgress();shuffle(deck);index=0;flipped=false;study="all";render();};
document.getElementById("modeRow").onclick=(e)=>{const b=e.target.closest("[data-mode]");if(!b)return;mode=b.dataset.mode;flipped=false;document.querySelectorAll("#modeRow .toggle").forEach(t=>t.classList.toggle("active",t===b));render();};
document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowLeft")document.getElementById("prev").click();
  else if(e.key==="ArrowRight")document.getElementById("next").click();
  else if(e.key===" "||e.key==="Enter"){e.preventDefault();flipped=!flipped;render();}
  else if(e.key==="1")document.getElementById("stillBtn").click();
  else if(e.key==="2")document.getElementById("knowBtn").click();
});
render();
</script>
</body>
</html>
